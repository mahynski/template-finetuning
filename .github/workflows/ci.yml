name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  pre-commit:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  validate-notebooks:
    name: Validate Notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install nbformat
        run: pip install "nbformat>=4.2"

      - name: Validate notebook format
        run: |
          python - <<'EOF'
          import nbformat
          import pathlib
          import sys

          errors = []
          notebooks = list(pathlib.Path(".").rglob("*.ipynb"))
          print(f"Checking {len(notebooks)} notebook(s)...")

          for nb_path in notebooks:
              try:
                  nb = nbformat.read(str(nb_path), as_version=4)
                  nbformat.validate(nb)
                  print(f"  OK  {nb_path}")
              except Exception as exc:
                  errors.append(f"  FAIL {nb_path}: {exc}")

          if errors:
              print("\nNotebook validation failures:")
              for err in errors:
                  print(err)
              sys.exit(1)

          print(f"\nAll {len(notebooks)} notebook(s) passed validation.")
          EOF

  python-syntax:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./.git/*" \
            -print -exec python -m py_compile {} \;
          echo "All Python files passed syntax check."
